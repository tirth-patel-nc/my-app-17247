workflows:
  react-native-ios:
    name: React Native iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: myapp17247
    environment:
      xcode: 26.4
      ios_signing:
        distribution_type: development
        bundle_identifier: com.anonymous.myapp17247
      vars:
        BUNDLE_ID: "com.anonymous.myapp17247" 
        XCODE_WORKSPACE: "myapp17247.xcworkspace" 
        XCODE_SCHEME: "myapp17247" 
    scripts:
      - name: Install Runtime
        script: |
          set -e
          xcrun simctl list >/dev/null 2>&1 || true
          xcodebuild -downloadPlatform iOS -buildVersion 18.6
          export UUID=$(xcrun simctl create "iPhone 16 Pro (iOS 18)" \
            "com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro" \
            "com.apple.CoreSimulator.SimRuntime.iOS-18-6")
          xcrun simctl boot $UUID
          xcrun simctl list | grep "16 Pro (iOS 18)"
      - name: Run Expo Prebuild
        script: | 
          npm install
          npx expo prebuild
      - name: Install CocoaPods dependencies
        script: | 
          cd ios && pod install
      - name: Set up provisioning profiles settings on Xcode project
        script: xcode-project use-profiles
      - name: Build ipa for distribution
        script: | 
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
